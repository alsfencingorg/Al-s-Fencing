<!DOCTYPE html>
<html>
<head>
  <title>My Work</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
    }
    h1 {
      padding: 20px;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .item {
      background: #1c1c1c;
      padding: 10px;
      border-radius: 10px;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>
<h1>My Work</h1>

<div class="gallery">
  <div class="item">
    <img src="image1.jpg">
    <p>Caption here</p>
  </div>
</div>

</body>
</html>
